<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Basic Meta Tags -->

    <meta
      name="description"
      content="Karim Industries offers premium quality medical, surgical, and dental instruments manufactured in Pakistan and supplied globally. Discover certified, export-grade healthcare solutions."
    />
    <meta
      name="keywords"
      content="medical products, surgical instruments, dental instruments, hospital supplies, Karim Industries, export, manufacturer, Pakistan, healthcare, surgical tools, sterile instruments"
    />
    <meta name="author" content="Karim Industries" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://karimindustries.com/" />

    <!-- Favicon & App Icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph Tags for Facebook & LinkedIn -->
    <meta
      property="og:title"
      content="Karim Industries | Medical Products Manufacturer & Exporter"
    />
    <meta
      property="og:description"
      content="Premium quality surgical, dental, and hospital instruments for export worldwide. Trusted by global healthcare providers."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://karimindustries.com/" />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Karim Industries | Medical Products Manufacturer & Exporter"
    />
    <meta
      name="twitter:description"
      content="Premium quality surgical, dental, and hospital instruments for export worldwide. Trusted by global healthcare providers."
    />
    <meta name="twitter:image" content="/og-image.jpg" />
    <meta name="twitter:site" content="@karim_industries" />
    <meta name="twitter:creator" content="@karim_industries" />

    <!-- Theme Color (for PWA/browser bar) -->
    <meta name="theme-color" content="#0a2342" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "name": "Karim Industries",
        "url": "https://karimindustries.com/",
        "logo": "https://karimindustries.com/logo.png",
        "description": "Karim Industries offers premium quality medical, surgical, and dental instruments manufactured in Pakistan and supplied globally.",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+92-331-4597652",
          "contactType": "Customer Service",
          "areaServed": "Worldwide",
          "availableLanguage": ["English", "Urdu"]
        },
        "sameAs": [
          "https://www.facebook.com/karimindustries",
          "https://www.linkedin.com/company/karimindustries",
          "https://twitter.com/karim_industries"
        ]
      }
